<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой котел — FoodFast</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        .cart-grid { display: grid; grid-template-columns: 1fr 380px; gap: 30px; margin-top: 30px; align-items: start; }
        .cart-item { display: grid; grid-template-columns: 80px 1fr 140px 100px; align-items: center; gap: 20px; background: #2A2A2A; padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #444; }
        .item-img { width: 70px; height: 70px; border-radius: 12px; background: #444 center/cover; border: 1px solid #555; }
        .item-info h3 { margin: 0 0 5px 0; font-size: 18px; color: #fff; }
        .qty-btns { display: flex; align-items: center; justify-content: center; gap: 15px; background: #333; padding: 8px; border-radius: 12px; width: 110px; border: 1px solid #444; }
        .q-btn { border: none; background: #444; color: #eee; width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 18px; transition: 0.2s; }
        .q-btn:hover { background: var(--primary); color: #fff; }
        .price-total { font-weight: bold; font-size: 18px; text-align: right; color: #fff; }
        .checkout-side { background: #2A2A2A; padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); position: sticky; top: 120px; border: 1px solid #444; }
        .checkout-side h3 { color: var(--primary); font-family: 'Creepster', cursive; font-size: 28px; margin-bottom: 20px; }
        .total-row { font-size: 24px; font-weight: bold; color: #fff; border-top: 1px solid #444; padding-top: 20px; margin-top: 20px; }
        .address-input { width: 100%; padding: 15px; margin: 15px 0; border: 1px solid #555; border-radius: 12px; background: #333; color: #eee; }
    </style>
</head>
<body style="background: #1A1A1A; color: #eee;">
    <header class="header">
        <div class="container flex-sb">
            <div class="logo" onclick="location.href='index.php'">Food<span>Fast</span> 🎃</div>
            <a href="index.php" class="btn btn-secondary">← В меню</a>
        </div>
    </header>

    <main class="container">
        <h1 style="margin: 40px 0; font-family: 'Creepster', cursive; font-size: 64px; color: #fff; text-align: center;">Мой котел 🧙‍♂️</h1>
        <div id="cart-wrapper"></div>
    </main>

    <script>
        // ГЛАВНАЯ ФУНКЦИЯ ОТРИСОВКИ
        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const wrapper = document.getElementById('cart-wrapper');
            
            if (cart.length === 0) {
                wrapper.innerHTML = `
                    <div class="card" style="text-align:center; padding:80px 20px; border: 2px dashed #444;">
                        <span style="font-size: 80px; display: block; margin-bottom: 20px;">🛒</span>
                        <h2 style="font-size: 32px; color: #fff;">В котле пусто...</h2>
                        <br><a href="index.php" class="btn btn-primary">Наполнить котел</a>
                    </div>`;
                return;
            }

            let totalSum = 0;
            let itemsHtml = '';

            cart.forEach((item, index) => {
                const itemTotal = item.price * item.qty;
                totalSum += itemTotal;
                itemsHtml += `
                    <div class="cart-item">
                        <div class="item-img" style="background-image: url('${item.img}')"></div>
                        <div class="item-info">
                            <h3>${item.name}</h3>
                            <p style="color: var(--primary);">${item.price} ₽</p>
                        </div>
                        <div class="qty-btns">
                            <button class="q-btn" onclick="window.updateQty(${index}, -1)">-</button>
                            <span style="color: #fff; font-weight: bold;">${item.qty}</span>
                            <button class="q-btn" onclick="window.updateQty(${index}, 1)">+</button>
                        </div>
                        <div class="price-total">${itemTotal} ₽</div>
                    </div>`;
            });

            wrapper.innerHTML = `
                <div class="cart-grid">
                    <div>${itemsHtml}</div>
                    <aside class="checkout-side">
                        <h3>Детали заказа</h3>
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px; color:#aaa;">
                            <span>Товары</span><span>${totalSum} ₽</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; color:var(--primary); font-weight:bold;">
                            <span>Доставка</span><span>Бесплатно</span>
                        </div>
                        <input type="text" id="delivery-address" class="address-input" placeholder="Введите ваш адрес">
                        <div class="total-row" style="display:flex; justify-content:space-between;">
                            <span>Итого</span><span>${totalSum} ₽</span>
                        </div>
                        <button class="btn btn-primary btn-full" style="margin-top:20px;" onclick="placeOrder()">Оформить заказ ☠️</button>
                    </aside>
                </div>`;
        }

        // ФУНКЦИЯ ОБНОВЛЕНИЯ (ИСПРАВЛЕНО)
        window.updateQty = function(index, delta) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            
            if (cart[index]) {
                cart[index].qty += delta;

                // Если стало 0 — удаляем из списка
                if (cart[index].qty <= 0) {
                    cart.splice(index, 1);
                }

                localStorage.setItem('cart', JSON.stringify(cart));
                renderCart(); // Мгновенно обновляем экран
            }
        };

        function placeOrder() {
    const address = document.getElementById('delivery-address').value;
    if (!address || address.trim().length < 5) {
        alert("Пожалуйста, введите адрес доставки!");
        return;
    }
    
    // Сохраняем адрес, чтобы показать его на карте
    localStorage.setItem('last_address', address);
    // Очищаем корзину
    localStorage.removeItem('cart');
    
    // ПЕРЕХОДИМ НА КАРТУ
    window.location.href = 'order_status.php';
}


        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
